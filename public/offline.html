<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – KrishiSanjivni</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:linear-gradient(135deg,#1B5E20 0%,#2E7D32 50%,#388E3C 100%);
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:24px;
    }
    .container{
      max-width:480px;
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(10px);
      border-radius:20px;
      padding:48px 32px;
      border:1px solid rgba(255,255,255,0.15);
      box-shadow:0 8px 32px rgba(0,0,0,0.2);
    }
    .icon{
      width:80px;height:80px;margin:0 auto 24px;
      background:rgba(255,255,255,0.15);
      border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:40px;
    }
    h1{font-size:1.75rem;margin-bottom:12px;font-weight:700;letter-spacing:-0.5px}
    .subtitle{font-size:1rem;opacity:0.9;margin-bottom:24px;line-height:1.6}
    .info{
      background:rgba(255,255,255,0.1);
      border-radius:12px;
      padding:16px 20px;
      font-size:0.9rem;
      line-height:1.5;
      opacity:0.85;
    }
    .retry-btn{
      margin-top:28px;
      display:inline-block;
      padding:12px 32px;
      background:#fff;
      color:#1B5E20;
      border:none;
      border-radius:10px;
      font-size:1rem;
      font-weight:600;
      cursor:pointer;
      transition:transform 0.2s,box-shadow 0.2s;
    }
    .retry-btn:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.2)}
    .retry-btn:active{transform:translateY(0)}
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌿</div>
    <h1>You Are Offline</h1>
    <p class="subtitle">
      It seems you don't have an active internet connection right now.
    </p>
    <div class="info">
      Previously loaded advisory and crop data are still available.
      Your pending requests will sync automatically when the connection returns.
    </div>
    <button class="retry-btn" onclick="window.location.reload()">
      Try Again
    </button>
  </div>
</body>
</html>
